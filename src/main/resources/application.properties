spring.application.name=duas-marias

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# IMAGES
project.image=images/


spring.app.jwtSecret=mySecretKey123912738kjdsfksjfdssdgskdmgksdml
spring.app.jwtExpirationMs=30000000
spring.app.jwtCookieName=springBootEcom

logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.org.springframework.security=DEBUG
logging.level.org.com.ecommerce.duas_marias=DEBUG